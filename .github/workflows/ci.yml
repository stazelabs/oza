name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download test fixtures
        if: runner.os == 'Linux'
        run: make testdata

      - name: Run library tests
        run: go test -race ./... -count=1

      - name: Run CLI tests
        run: cd cmd && go test -race ./... -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      - name: Lint library
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2

      - name: Lint CLI
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          working-directory: cmd

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build library
        run: go build ./...

      - name: Build CLI tools
        run: go build ./...
        working-directory: cmd

      - name: Build all binaries (Linux only)
        if: runner.os == 'Linux'
        run: make build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate library coverage report
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate CLI coverage report
        run: cd cmd && go test -coverprofile=../coverage-cmd.out -covermode=atomic ./internal/...

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out,coverage-cmd.out
          fail_ci_if_error: false

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 ./oza/ ./ozawrite/ | tee bench-output.txt

      - name: Store / compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: false

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run fuzz targets (30s each)
        run: make fuzz
